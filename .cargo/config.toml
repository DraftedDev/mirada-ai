[profile.dev]
incremental = true
opt-level = "z"
rustflags = ["-Zthreads=0", "-Znext-solver"]

[profile.release]
lto = true
opt-level = 3
strip = true
panic = "abort"
codegen-units = 1
rustflags = ["-Ctarget-cpu=native"]

[profile.release.package."*"]
opt-level = 3

[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"
rustdocflags = ["-Clinker=rust-lld.exe"]
